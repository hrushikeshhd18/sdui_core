name: sdui_core
description: >-
  A high-performance Server-Driven UI (SDUI) engine for Flutter. Render
  dynamic, state-aware layouts from JSON payloads at runtime — no App Store
  review needed for UI changes.
version: 0.2.1
homepage: https://github.com/hrushikeshhd18/sdui_core
repository: https://github.com/hrushikeshhd18/sdui_core
issue_tracker: https://github.com/hrushikeshhd18/sdui_core/issues
documentation: https://pub.dev/documentation/sdui_core/latest/

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  cached_network_image: ^3.3.0
  flutter:
    sdk: flutter
  http: ^1.2.0
  meta: ^1.12.0
  shared_preferences: ^2.3.0
  url_launcher: ^6.3.0
  web_socket_channel: ^3.0.0

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0

topics:
  - dynamic-widgets
  - json
  - remote-widgets
  - sdui
  - server-driven-ui

platforms:
  android:
  ios:
  linux:
  macos:
  web:
  windows:
